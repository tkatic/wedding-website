<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tristan & Arta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #EDE8DF;
      --cream-light: #F5F0E8;
      --green: #2D4B2A;
      --text: #2C2925;
      --text-light: #6B6460;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --script: 'Great Vibes', cursive;
      --sans: 'Jost', sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--green);
      color: var(--cream);
      font-family: var(--sans);
      font-weight: 300;
    }
    .gate {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .monogram {
      font-family: var(--script);
      font-size: clamp(3rem, 10vw, 5.5rem);
      color: rgba(237, 232, 223, 0.9);
      margin-bottom: 8px;
      line-height: 1;
    }
    .date {
      font-family: var(--serif);
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(237, 232, 223, 0.55);
      margin-bottom: 48px;
    }
    .gate h1 {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      color: rgba(237, 232, 223, 0.85);
      margin-bottom: 10px;
    }
    .gate p {
      font-size: 0.85rem;
      color: rgba(237, 232, 223, 0.45);
      letter-spacing: 0.06em;
      margin-bottom: 36px;
    }
    .form-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }
    .pw-wrap {
      position: relative;
      width: 100%;
    }
    .pw-wrap input {
      width: 100%;
      padding: 14px 44px 14px 20px;
      background: rgba(237, 232, 223, 0.08);
      border: 1px solid rgba(237, 232, 223, 0.25);
      border-radius: 2px;
      color: var(--cream);
      font-family: var(--sans);
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .pw-wrap input::placeholder {
      color: rgba(237, 232, 223, 0.35);
      letter-spacing: 0.08em;
    }
    .pw-wrap input:focus {
      border-color: rgba(237, 232, 223, 0.55);
      background: rgba(237, 232, 223, 0.12);
    }
    .pw-wrap input.error {
      border-color: rgba(220, 150, 130, 0.7);
      animation: shake 0.35s ease;
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: rgba(237, 232, 223, 0.4);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      width: auto;
    }
    .toggle-pw:hover {
      background: none;
      border: none;
      color: rgba(237, 232, 223, 0.75);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }
    button {
      width: 100%;
      padding: 14px 20px;
      background: rgba(237, 232, 223, 0.12);
      border: 1px solid rgba(237, 232, 223, 0.35);
      border-radius: 2px;
      color: var(--cream);
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    button:hover {
      background: rgba(237, 232, 223, 0.2);
      border-color: rgba(237, 232, 223, 0.55);
    }
    .error-msg {
      font-size: 0.78rem;
      color: rgba(220, 150, 130, 0.85);
      letter-spacing: 0.06em;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="gate">
    <div class="monogram">T &amp; A</div>
    <div class="date">Houston, Texas</div>
    <h1>You're invited</h1>
    <p>Enter the password to view the site</p>
    <div class="form-wrap">
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="Password" autocomplete="off" />
        <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Show password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button onclick="checkPassword()">Enter</button>
      <div class="error-msg" id="err"></div>
    </div>
  </div>

  <script>
    const HASH = '5aa735af498ac3982fe6ec97044e1f27d0c8dcf0a245242d289687107449bbaa';

    function togglePassword() {
      const pw = document.getElementById('pw');
      const icon = document.getElementById('eye-icon');
      const showing = pw.type === 'text';
      pw.type = showing ? 'password' : 'text';
      icon.innerHTML = showing
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    async function checkPassword() {
      const input = document.getElementById('pw').value;
      const msgEl = document.getElementById('err');
      const pwEl  = document.getElementById('pw');

      const encoded = new TextEncoder().encode(input);
      const hashBuf = await crypto.subtle.digest('SHA-256', encoded);
      const hashHex = Array.from(new Uint8Array(hashBuf))
        .map(b => b.toString(16).padStart(2, '0')).join('');

      if (hashHex === HASH) {
        localStorage.setItem('wedding-auth', HASH);
        const dest = new URLSearchParams(location.search).get('r') || 'index.html';
        window.location.replace(dest);
      } else {
        pwEl.classList.add('error');
        pwEl.value = '';
        msgEl.textContent = 'Incorrect password — try again.';
        setTimeout(() => pwEl.classList.remove('error'), 400);
      }
    }
  </script>
</body>
</html>
